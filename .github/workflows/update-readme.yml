name: Update README

# Runs whenever progress.yml (or the generator script) changes on main,
# and can also be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - "progress.yml"
      - "scripts/generate_readme.py"
  workflow_dispatch:

# Needed so the workflow can commit the updated README.md back to the repo.
permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate README sections
        run: python scripts/generate_readme.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to README.md - nothing to commit."
          else
            git commit -m "docs: auto-update progress log, notes & resources [skip ci]"
            git push
          fi
